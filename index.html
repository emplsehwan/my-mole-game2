<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오민호 잡기 게임</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #f0f8ff;
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 10px;
        }
        .score-board {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 120px);
            gap: 20px;
            justify-content: center;
            margin: 0 auto;
        }
        .hole {
            width: 120px;
            height: 120px;
            background-color: #5c4033; /* 흙 색깔 */
            border-radius: 50%;
            position: relative;
            overflow: hidden; /* 구멍 밖으로 나가는 사진 자르기 */
            box-shadow: inset 0 0 10px #000;
        }
        .mole {
            width: 100%;
            height: 100%;
            position: absolute;
            top: 100%; /* 기본 상태: 구멍 아래에 숨김 */
            left: 0;
            object-fit: cover;      /* 사진 비율 안 깨지고 구멍에 꽉 차게 */
            object-position: center; /* 사진 정중앙을 기준으로 맞춤 */
            transition: top 0.2s ease-out; /* 올라오는 속도 */
            cursor: pointer;
        }
        .mole.up {
            top: 0; /* 위로 쏙 올라온 상태 */
        }
        .start-btn {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #ff6347;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .start-btn:hover {
            background-color: #ff4500;
        }
    </style>
</head>
<body>

    <h1>오민호 잡기!</h1>
    <div class="score-board">점수: <span id="score">0</span></div>
    <button class="start-btn" onclick="startGame()">게임 시작!</button>

    <div class="grid">
        <div class="hole"><img class="mole" src="" alt="두더지"></div>
        <div class="hole"><img class="mole" src="" alt="두더지"></div>
        <div class="hole"><img class="mole" src="" alt="두더지"></div>
        <div class="hole"><img class="mole" src="" alt="두더지"></div>
        <div class="hole"><img class="mole" src="" alt="두더지"></div>
        <div class="hole"><img class="mole" src="" alt="두더지"></div>
        <div class="hole"><img class="mole" src="" alt="두더지"></div>
        <div class="hole"><img class="mole" src="" alt="두더지"></div>
        <div class="hole"><img class="mole" src="" alt="두더지"></div>
    </div>

    <script>
        const holes = document.querySelectorAll('.hole');
        const scoreBoard = document.querySelector('#score');
        const moles = document.querySelectorAll('.mole');
        
        let lastHole;
        let timeUp = false;
        let score = 0;

        // 사진 파일명들
        const myFaces = [
            '1000029751.jpg',
            '1000029744.jpg',
            '1000029758.jpg',
            '1000029745.jpg',
            '1000029752.jpg'
        ];

        // 소리 파일명들
        const sounds = [
            new Audio('sound1.mp3'),
            new Audio('sound2.mp3')
        ];

        function randomTime(min, max) {
            return Math.round(Math.random() * (max - min) + min);
        }

        function randomHole(holes) {
            const idx = Math.floor(Math.random() * holes.length);
            const hole = holes[idx];
            if (hole === lastHole) {
                return randomHole(holes);
            }
            lastHole = hole;
            return hole;
        }

        function randomFace() {
            const idx = Math.floor(Math.random() * myFaces.length);
            return myFaces[idx];
        }

        function playRandomSound() {
            const idx = Math.floor(Math.random() * sounds.length);
            sounds[idx].currentTime = 0; 
            sounds[idx].play();
        }

        function peep() {
            const time = randomTime(600, 1000); 
            const hole = randomHole(holes);
            const moleImg = hole.querySelector('.mole');
            
            moleImg.src = randomFace(); 
            moleImg.classList.add('up'); 

            setTimeout(() => {
                moleImg.classList.remove('up'); 
                if (!timeUp) peep();
            }, time);
        }

        function startGame() {
            scoreBoard.textContent = 0;
            timeUp = false;
            score = 0;
            peep();
            
            setTimeout(() => timeUp = true, 15000); // 15초 뒤에 게임 종료
        }

        function whack(e) {
            if(!e.isTrusted) return; 
            
            score++;
            this.classList.remove('up'); // 누르면 바로 내려감
            scoreBoard.textContent = score;
            playRandomSound(); // 소리 재생
        }

        moles.forEach(mole => mole.addEventListener('mousedown', whack));
        moles.forEach(mole => mole.addEventListener('touchstart', whack)); 
    </script>
</body>
</html>
