<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>오민호 잡기 게임</title>
    <style>
        body {
            font-family: 'Arial', sans-serif;
            text-align: center;
            background-color: #f0f8ff; /* image_9.png의 배경색 */
            margin: 0;
            padding: 20px;
        }
        h1 {
            color: #333;
            margin-bottom: 5px;
        }
        .score-board {
            font-size: 24px;
            font-weight: bold;
            margin-bottom: 30px; /* 그리드와 간격 확보 */
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(3, 120px); /* 구멍 크기 약간 키움 */
            grid-gap: 20px; /* image_9.png의 넓은 간격 */
            justify-content: center;
            margin: 0 auto;
        }
        .hole {
            width: 120px;
            height: 120px;
            background-color: #5c4033; /* image_9.png의 갈색 */
            border-radius: 50%;
            position: relative;
            overflow: hidden; /* 두더지가 테두리 밖으로 잘리게 */
            box-shadow: inset 0 0 10px #000; /* 구멍 깊이감 */
        }
        .mole {
            width: 100%;
            height: 100%;
            position: absolute;
            
            /* 핵심: 기본 숨김 상태 - 구멍 아래에 위치 */
            top: 100%; 
            left: 50%;
            transform: translateX(-50%); /* 가로 중앙 */
            
            transition: all 0.2s ease-out; /* 애니메이션 */
            cursor: pointer;
            object-fit: cover; /* 이미지가 구멍에 맞게 가득 차고 중앙 정렬 */
            object-position: center; /* object-fit 사용 시 중앙에 위치 */
        }
        
        /* 핵심: 튀어오른 상태 - 완벽한 중앙 배치 */
        .mole.up {
            top: 50%; /* 세로 중앙 */
            transform: translate(-50%, -50%); /* 가로세로 중앙 완벽 정렬 */
        }
        
        .start-btn {
            padding: 10px 20px;
            font-size: 18px;
            background-color: #ff6347;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            margin-bottom: 20px;
        }
        .start-btn:hover {
            background-color: #ff4500;
        }
    </style>
</head>
<body>
